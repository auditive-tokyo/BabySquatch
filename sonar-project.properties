sonar.projectKey=auditive-tokyo_BoomBaby
sonar.organization=auditive-tokyo

sonar.sources=Source
sonar.tests=Tests
sonar.test.inclusions=Tests/**

# GUI は解析対象には残しつつ、カバレッジ集計のみ除外
sonar.coverage.exclusions=Source/GUI/**,Source/PluginEditor.cpp,Source/PluginEditor.h

# C++ として解析（.h も C++ 扱い）
# sonar.cfamily.compile-commands は CI ワークフロー側で --define により指定
sonar.c.file.suffixes=.c
sonar.cpp.file.suffixes=.cpp,.h
