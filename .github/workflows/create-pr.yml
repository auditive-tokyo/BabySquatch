name: Create Release PR

on:
  push:
    branches:
      - main

jobs:
  create-pr:
    name: Open PR to release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY="Release $(date +%Y-%m-%d)"
          EXISTING=$(gh pr list --base release --head main --state open --json number,title --jq '.[0]')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base release \
              --head main \
              --title "$TODAY" \
              --body "Automated PR from main → release"
          else
            PR_NUMBER=$(echo "$EXISTING" | jq -r '.number')
            PR_TITLE=$(echo "$EXISTING" | jq -r '.title')
            if [ "$PR_TITLE" != "$TODAY" ]; then
              gh pr edit "$PR_NUMBER" --title "$TODAY"
              echo "PR #$PR_NUMBER title updated: '$PR_TITLE' → '$TODAY'"
            else
              echo "PR #$PR_NUMBER is up to date — skipping"
            fi
          fi
